jenkins:
  systemMessage: "Controlled by Configuration as Code"
  # agentProtocols:
  #   - "JNLP4-connect"
  #   - "Ping"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false
    # globalMatrix:
    #   permissions:
    #     - "Jobs/Build:dev"
    #     - "Jobs/Cancel:dev"
    #     - "Jobs/Read:dev"
    #     - "Jobs/Workspace:dev"
    #     - "Overall/Administer:admin"
    #     - "Overall/Read:authenticated"
    #     - "Run/Replay:dev"
    #     - "Run/Update:dev"
  clouds:
    - kubernetes:
        containerCap: 10
        containerCapStr: "10"
        credentialsId: "k8scred"
        name: "k8s"
        namespace: "jenkins"
        serverUrl: "https://ddbt.duckdns.org:6443"
        webSocket: true
    - docker:
        dockerApi:
          dockerHost:
            uri: "unix:///var/run/docker.sock"
        name: "docker"
        templates:
          - connector:
              attach:
                user: "jenkins"
            dockerTemplateBase:
              # TODO: pin sha256 or versions when using in production
              image: "jenkins/agent"
              mounts:
                - "type=tmpfs,destination=/run"
                - "type=bind,source=/var/run/docker.sock,destination=/var/run/docker.sock"
                - "type=volume,src=hello,dst=/world"
              mountsString: |-
                type=tmpfs,destination=/run
                type=bind,source=/var/run/docker.sock,destination=/var/run/docker.sock
                type=volume,src=hello,dst=/world
            instanceCapStr: "10"
            labelString: "docker-agent"
            remoteFs: "/tmp/jenkins/agent"
            removeVolumes: true
            retentionStrategy:
              idleMinutes: 1
  crumbIssuer:
    standard:
      excludeClientIPFromCrumb: false
  disableRememberMe: false
  disabledAdministrativeMonitors:
    - "hudson.util.DoubleLaunchChecker"
    - "hudson.diagnosis.ReverseProxySetupMonitor"
  labelAtoms:
    - name: "bobo"
    - name: "built-in"
    - name: "ddmbpro"
    - name: "ansible"
    - name: "docker"
    - name: "docker-agent"
    - name: "lina"
    - name: "linux"
    - name: "mac"
    - name: "python"
    - name: "rpi"
    - name: "rpi01"
    - name: "rpi02"
  markupFormatter: "plainText"
  mode: NORMAL
  # mode: EXCLUSIVE
  myViewsTabBar: "standard"
  nodeMonitors:
    - diskSpaceMonitor:
        freeSpaceThreshold: "1GB"
    - tmpSpace:
        freeSpaceThreshold: "1GB"
