  pgadmin:
    restart: always
    dns:
      - 100.100.100.100
    image: dpage/pgadmin4
    ports:
      - 5080:80
      - 5433:433
    environment:
      PGADMIN_DEFAULT_EMAIL: pgadmin@email.com
      PGADMIN_DEFAULT_PASSWORD: pgadmin@1345

  # test:
  #   image: busybox
  #   command: ["sleep", "3600"]
  #   dns:
  #     - 100.100.100.100
  pg1:
    build: ./postgres
    restart: always
    ports:
      - 5432:5432
    dns:
      - 100.100.100.100
    environment:
      REPMGR_PARTNER_NODES: nix01,nix03,bobo,lina,goku
      BITNAMI_DEBUG: true
      REPMGR_NODE_ID: 1
      REPMGR_NODE_NAME: nix-01
      REPMGR_NODE_NETWORK_NAME: nix01
      REPMGR_PRIMARY_HOST: nix01
      REPMGR_PASSWORD: repmgr
      POSTGRESQL_PASSWORD: postgres
      POSTGRESQL_WAL_LEVEL: logical
      # REPMGR_PORT_NUMBER: 5432
      # REPMGR_PRIMARY_PORT: 5432
      # REPMGR_ROLE: primary
      # POSTGRESQL_POSTGRES_PASSWORD: postgres123
      # POSTGRESQL_USERNAME: docker
      # POSTGRESQL_PASSWORD: docker
      # POSTGRESQL_DATABASE: docker
      # POSTGRESQL_SHARED_PRELOAD_LIBRARIES: paudit, pt_stat_statements
      POSTGRESQL_SYNCHRONOUS_COMMIT_MODE: remote_write
      # POSTGRESQL_NUM_SYNCHRONOUS_REPLICAS: 1
    develop:
      watch:
        - action: rebuild
          path: ./postgres/Dockerfile
