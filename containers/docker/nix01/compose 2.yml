  haproxy:
    build: ./haproxy
    restart: always
    mem_limit: 8192m
    ports:
      - 3000:3000
      - 5444:5432
      - 5445:5433
    privileged: true
    dns:
      - 100.100.100.100
    develop:
      watch:
        - action: sync+restart
          path: ./haproxy/haproxy.cfg
          target: /usr/local/etc/haproxy/haproxy.cfg
        - action: rebuild
          path: ./haproxy/scripts
        - action: rebuild
          path: ./haproxy/Dockerfile
        # - action: rebuild
