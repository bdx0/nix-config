[global]
  workgroup = WORKGROUP
  dos charset = cp850
  unix charset = ISO-8859-1
  smb ports = 445
  server string = samba
  security = user
  guest account = nobody
  map to guest = Bad User
  ; encrypt passwords = yes
  passdb backend = smbpasswd
  load printers = no
  printing = bsd
  printcap name = /dev/null
  disable spoolss = yes
  disable netbios = yes
  server role = standalone server
  log file = /dev/stdout
  server services = -dns, -nbt
  ;guest ok = yes
  ;public = yes
  ;force user = user
  ;name resolve order = hosts
  ;log level = 3

[Weed]
  path = /mnt
  comment = SeaWeedfs
  browseable = yes
  writable = yes
  read only = no
  force user = root
  force group = root
  valid users = dd