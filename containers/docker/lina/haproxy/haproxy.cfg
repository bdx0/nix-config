global
    maxconn 4096
    ulimit-n 30000
    external-check
    insecure-fork-wanted
    log stdout format raw daemon notice

resolvers docker
    nameserver dns1 100.100.100.100:53
    nameserver dns2 127.0.0.11:53
    hold valid 10s

defaults
    log         global
    mode        tcp
    option      tcplog
    option      dontlognull
    option      tcp-check
    option      srvtcpka
    http-reuse  aggressive
    timeout     client 180m
    timeout     server 180m
    timeout     connect 2s1

listen stats
    bind  *:3000
    mode  http
    stats enable
    stats uri /
    stats refresh 2s
    stats auth admin:admin1345

listen primary
    bind *:5432
    maxconn 2048
    option external-check
    external-check command /scripts/primary-check.sh
    # default-server resolvers docker init-addr none check inter 2s fall 1 rise 2 slowstart 4000
    # default-server port 5432 inter 2s downinter 5s rise 3 fall 2 slowstart 60s maxconn 64 maxqueue 128 weight 100
    # https://severalnines.com/resources/whitepapers/postgresql-load-balancing-haproxy/
    server pg1 nix01:5432 check inter 2s fall 1 rise 2
    server pg2 nix02:5432 check inter 2s fall 1 rise 2
    server pg3 nix03:5432 check inter 2s fall 1 rise 2
    server lina lina:5432 check inter 2s fall 1 rise 2
    server bobo bobo:5432 check inter 2s fall 1 rise 2
    server goku goku:5432 check inter 2s fall 1 rise 2

