listen standy
    bind *:5433
    maxconn 2048
    option external-check
    external-check command /scripts/standby-check.sh
    balance roundrobin
    # default-server resolvers docker init-addr none check inter 2s fall 1 rise 2 slowstart 4000
    server pg1 nix01:5432 check inter 2s fall 1 rise 2
    server pg2 nix02:5432 check inter 2s fall 1 rise 2
    server pg3 nix03:5432 check inter 2s fall 1 rise 2
    server lina lina:5432 check inter 2s fall 1 rise 2
    server bobo bobo:5432 check inter 2s fall 1 rise 2
    server goku goku:5432 check inter 2s fall 1 rise 2

